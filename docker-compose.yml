services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  hardhat:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8545
    ports: ["8545:8545"]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - REDIS_URL=redis://redis:6379
      - RPC_URL=http://hardhat:8545
      - CONTRACT_ADDRESS=0x...
    depends_on: [redis, hardhat]
