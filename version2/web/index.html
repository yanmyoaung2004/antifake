<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntiFake — Verify</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #0f172a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    max-width: 520px;
    width: 100%;
    padding: 32px 24px;
    text-align: center;
  }
  h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
  .drop-zone {
    border: 2px dashed #334155;
    border-radius: 16px;
    padding: 48px 24px;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #3b82f6; background: #1e293b; }
  .drop-zone.has-image { border-color: #22c55e; padding: 8px; }
  .drop-zone-text { font-size: 15px; color: #94a3b8; }
  .drop-zone-text .icon { font-size: 40px; display: block; margin-bottom: 12px; }
  .drop-zone input { display: none; }
  .preview { max-width: 100%; max-height: 300px; border-radius: 8px; display: none; }
  .preview.show { display: block; margin: 0 auto; }
  .btn {
    margin-top: 20px;
    background: #3b82f6;
    color: #fff;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: 0.2s;
  }
  .btn:hover { background: #2563eb; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .loading { display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
  .loading.show { display: flex; }
  .spinner {
    width: 20px; height: 20px;
    border: 3px solid #334155;
    border-top: 3px solid #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display: none; margin-top: 24px; }
  .result.show { display: block; }
  .badge {
    font-size: 22px; font-weight: 700; padding: 12px 20px;
    border-radius: 12px; margin-bottom: 12px;
  }
  .badge.verified { background: #052e16; color: #22c55e; }
  .badge.counterfeit { background: #450a0a; color: #ef4444; }
  .badge.error { background: #1e293b; color: #f59e0b; }
  .message { color: #94a3b8; font-size: 14px; margin-bottom: 16px; }
  .confidence { color: #64748b; font-size: 13px; margin-bottom: 16px; }
  .metrics {
    background: #1e293b; border-radius: 10px; padding: 14px; margin-bottom: 16px;
    text-align: left; font-size: 13px;
  }
  .metrics div { display: flex; justify-content: space-between; padding: 3px 0; }
  .metrics .label { color: #94a3b8; }
  .metrics .value { color: #e2e8f0; font-family: monospace; }
  .overlay-wrap { margin-bottom: 16px; }
  .overlay-wrap img { max-width: 100%; border-radius: 8px; border: 2px solid #334155; }
  .overlay-wrap .caption { color: #64748b; font-size: 12px; margin-top: 6px; }
  .footer { margin-top: 32px; font-size: 12px; color: #475569; }
</style>
</head>
<body>
<div class="container">
  <h1>AntiFake</h1>
  <p class="sub">Upload a photo of the crypto-anchor to verify</p>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-text" id="dropText">
      <span class="icon">📷</span>
      Tap to select a photo<br><span style="font-size:12px;color:#475569">or drag & drop</span>
    </div>
    <img class="preview" id="preview" alt="preview">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <button class="btn" id="verifyBtn" disabled>Verify</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span style="color:#94a3b8">Analyzing anchor pattern...</span>
  </div>

  <div class="result" id="result">
    <div class="badge" id="badge"></div>
    <div class="message" id="message"></div>
    <div class="confidence" id="confidence"></div>
    <div class="metrics" id="metrics"></div>
    <div class="overlay-wrap" id="overlayWrap">
      <img id="overlayImg" alt="heatmap">
      <div class="caption">Deviation heatmap — red areas indicate print quality loss</div>
    </div>
  </div>

  <div class="footer">AntiFake v2 — APICTA 2026</div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const dropText = document.getElementById('dropText');
const verifyBtn = document.getElementById('verifyBtn');
const loading = document.getElementById('loading');
const result = document.getElementById('result');
const badge = document.getElementById('badge');
const message = document.getElementById('message');
const confidence = document.getElementById('confidence');
const metrics = document.getElementById('metrics');
const overlayWrap = document.getElementById('overlayWrap');
const overlayImg = document.getElementById('overlayImg');

let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    preview.src = e.target.result;
    preview.classList.add('show');
    dropText.style.display = 'none';
    dropZone.classList.add('has-image');
    verifyBtn.disabled = false;
    result.classList.remove('show');
  };
  reader.readAsDataURL(file);
}

verifyBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  verifyBtn.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');

  try {
    const reader = new FileReader();
    const b64 = await new Promise((resolve) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(selectedFile);
    });

    const resp = await fetch('/api/v1/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        batch_id: 'BATCH-A',
        serial: '001',
        image_base64: b64
      })
    });

    const data = await resp.json();
    showResult(data);
  } catch (err) {
    showResult({ status: 'error', confidence: 0, message: 'Connection failed: ' + err.message, metrics: null, overlay_base64: null });
  } finally {
    loading.classList.remove('show');
    verifyBtn.disabled = false;
  }
});

function showResult(data) {
  result.classList.add('show');

  const isVerified = data.status === 'verified';
  const isCounterfeit = data.status === 'counterfeit';
  const badgeClass = isVerified ? 'verified' : isCounterfeit ? 'counterfeit' : 'error';
  const badgeText = isVerified ? '✅ AUTHENTIC' : isCounterfeit ? '🚫 COUNTERFEIT' : '⚠️ ERROR';
  const badgeColor = isVerified ? '#22c55e' : isCounterfeit ? '#ef4444' : '#f59e0b';

  badge.className = 'badge ' + badgeClass;
  badge.textContent = badgeText;
  badge.style.color = '';
  message.textContent = data.message || '';
  confidence.textContent = 'Confidence: ' + Math.round((data.confidence || 0) * 100) + '%';

  if (data.metrics) {
    metrics.style.display = 'block';
    metrics.innerHTML = '';
    const rows = [
      ['Edge diff ratio', data.metrics.edge_diff_ratio],
      ['Histogram correlation', data.metrics.hist_correlation],
      ['Pixel bleed ratio', data.metrics.bleed_ratio],
      ['Confidence', data.metrics.confidence * 100 + '%'],
    ];
    rows.forEach(([label, val]) => {
      const row = document.createElement('div');
      row.innerHTML = '<span class="label">' + label + '</span><span class="value">' + val + '</span>';
      metrics.appendChild(row);
    });
  } else {
    metrics.style.display = 'none';
  }

  if (data.overlay_base64) {
    overlayWrap.style.display = 'block';
    overlayImg.src = 'data:image/png;base64,' + data.overlay_base64;
  } else {
    overlayWrap.style.display = 'none';
  }
}
</script>
</body>
</html>
