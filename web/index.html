<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AntiFake — Verify</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,system-ui,sans-serif;
  background:#0b1120;
  color:#e2e8f0;
  min-height:100vh;
}
.header{
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
  padding:28px 16px 20px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}
.header h1{
  font-size:26px;font-weight:700;
  background:linear-gradient(135deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.5px;
}
.header .sub{font-size:13px;color:#64748b;margin-top:4px}
.container{max-width:520px;margin:0 auto;padding:16px}
.card{
  background:#131c31;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  transition:opacity .3s,transform .3s;
}
.drop-zone{
  border:2px dashed #1e293b;
  border-radius:14px;padding:36px 20px;
  cursor:pointer;transition:.3s;position:relative;
  text-align:center;
}
.drop-zone:hover,.drop-zone.dragover{border-color:#3b82f6;background:rgba(59,130,246,.06)}
.drop-zone.has-image{border-color:#22c55e;padding:6px;background:rgba(34,197,94,.04)}
.drop-zone-text .camera-icon{
  width:48px;height:48px;margin:0 auto 10px;
  background:linear-gradient(135deg,#1e293b,#334155);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.drop-zone-text{font-size:14px;color:#94a3b8}
.drop-zone-text .hint{font-size:11px;color:#475569;margin-top:4px}
.drop-zone input{display:none}
.preview{max-width:100%;max-height:200px;border-radius:10px;display:none;margin:0 auto}
.preview.show{display:block}
.gps-row{display:flex;gap:8px;margin-top:12px}
.gps-row input{
  flex:1;background:#0b1120;border:1px solid #1e293b;border-radius:10px;
  padding:10px 12px;color:#e2e8f0;font-size:13px;outline:none;transition:.2s;
}
.gps-row input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn{
  display:block;width:100%;margin-top:12px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;border:none;padding:14px;border-radius:12px;
  font-size:16px;font-weight:600;cursor:pointer;transition:.3s;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(37,99,235,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.loading{
  display:none;align-items:center;justify-content:center;gap:12px;
  padding:24px 0;
}
.loading.show{display:flex}
.spinner{width:22px;height:22px;border:3px solid #1e293b;border-top:3px solid #3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#64748b;font-size:14px}

.result{display:none;animation:fadeIn .4s ease}
.result.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.status-badge{
  border-radius:14px;padding:20px;text-align:center;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.status-badge.verified{
  background:linear-gradient(135deg,#052e16,#064e3b);
  border:1px solid rgba(34,197,94,.2);
}
.status-badge.verified .icon{font-size:44px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.status-badge.counterfeit{
  background:linear-gradient(135deg,#450a0a,#7f1d1d);
  border:1px solid rgba(239,68,68,.2);
}
.status-badge.counterfeit .icon{font-size:44px}
.status-badge.error{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border:1px solid rgba(245,158,11,.2);
}
.status-badge .icon{display:block;margin-bottom:6px}
.status-badge .label{font-size:20px;font-weight:700;letter-spacing:1px}
.status-badge.verified .label{color:#22c55e}
.status-badge.counterfeit .label{color:#ef4444}
.status-badge.error .label{color:#f59e0b}
.status-badge .msg{color:#94a3b8;font-size:13px;margin-top:4px}

.verdict-card{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:12px}
.verdict-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.verdict-icon.verified{background:rgba(34,197,94,.15);color:#22c55e}
.verdict-icon.counterfeit{background:rgba(239,68,68,.15);color:#ef4444}
.verdict-details{flex:1;min-width:0}
.verdict-title{font-size:15px;font-weight:600}
.verdict-title.verified{color:#22c55e}
.verdict-title.counterfeit{color:#ef4444}
.verdict-sub{color:#64748b;font-size:12px;margin-top:2px}
.verdict-conf{color:#475569;font-size:11px;margin-top:1px}

.alert{
  background:linear-gradient(135deg,#451a03,#78350f);
  border:1px solid rgba(251,191,36,.15);
  border-radius:12px;padding:12px 14px;margin-bottom:12px;
  font-size:13px;color:#fbbf24;display:flex;gap:8px;align-items:flex-start;
}
.alert .a-icon{flex-shrink:0;margin-top:1px}

.section-title{
  font-size:13px;font-weight:600;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:8px;
}
.metrics-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;
}
.metric-card{
  background:#0b1120;border-radius:10px;padding:10px 12px;text-align:center;
}
.metric-card .val{font-size:16px;font-weight:700;color:#e2e8f0;font-family:monospace}
.metric-card .lbl{font-size:10px;color:#64748b;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.metric-bar{height:3px;border-radius:2px;margin-top:6px;background:#1e293b;overflow:hidden}
.metric-bar .fill{height:100%;border-radius:2px;transition:width .6s ease}
.metric-bar .fill.ok{background:#22c55e}
.metric-bar .fill.warn{background:#f59e0b}
.metric-bar .fill.bad{background:#ef4444}

.overlay-wrap{margin-bottom:12px;text-align:center}
.overlay-wrap img{max-width:100%;max-height:180px;border-radius:10px;border:2px solid #1e293b}
.overlay-wrap .cap{color:#475569;font-size:11px;margin-top:4px}

.batch-header{
  font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:2px;
  display:flex;align-items:center;gap:6px;
}
.batch-region{color:#64748b;font-size:12px;margin-bottom:10px}

.med-card{
  background:linear-gradient(135deg,#0f172a,#131c31);
  border:1px solid #1e293b;border-radius:14px;padding:14px;margin-bottom:12px;
}
.med-card .head{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.med-card .head.ok{color:#22c55e}
.med-card .head.bad{color:#ef4444}
.med-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 12px;font-size:12px}
.med-grid .ml{color:#64748b}
.med-grid .mv{color:#e2e8f0}
.med-grid .mv.warn{color:#fbbf24}

#map{height:240px;border-radius:12px;display:none;border:2px solid #1e293b;overflow:hidden}
#map.show{display:block}

.footer{text-align:center;margin-top:20px;padding:16px}
.footer .brand{font-size:12px;color:#334155}
.footer .privacy{font-size:11px;color:#1e293b;margin-top:4px;line-height:1.4}

@media(max-width:480px){
  .header{padding:24px 16px 16px}
  .header h1{font-size:22px}
  .container{padding:12px}
  .card{padding:12px;border-radius:12px}
  .metrics-grid{grid-template-columns:1fr 1fr;gap:6px}
  .drop-zone{padding:28px 16px}
}
</style>
</head>
<body>

<div class="header">
  <h1>AntiFake</h1>
  <div class="sub">Verify authenticity &amp; trace the supply chain</div>
</div>

<div class="container">

  <div class="drop-zone card" id="dropZone">
    <div class="drop-zone-text" id="dropText">
      <div class="camera-icon">📷</div>
      <div>Tap to select a photo</div>
      <div class="hint">or drag &amp; drop</div>
    </div>
    <img class="preview" id="preview" alt="">
    <input type="file" id="fileInput" accept="image/*" capture="environment">
  </div>

  <div class="card" style="padding:12px 14px">
    <div class="gps-row">
      <input type="number" id="latInput" placeholder="Latitude" step="any" value="16.8661">
      <input type="number" id="lngInput" placeholder="Longitude" step="any" value="96.1951">
    </div>
  </div>

  <button class="btn" id="verifyBtn" disabled>Verify</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span class="loading-text">Analyzing anchor pattern &amp; tracing supply chain...</span>
  </div>

  <div class="result" id="result">

    <div class="status-badge" id="badge">
      <span class="icon" id="badgeIcon"></span>
      <div class="label" id="badgeLabel"></div>
      <div class="msg" id="badgeMsg"></div>
    </div>

    <div class="card" style="display:none" id="verdictCard">
      <div class="verdict-card">
        <div class="verdict-icon" id="verdictIcon"></div>
        <div class="verdict-details">
          <div class="verdict-title" id="verdictTitle"></div>
          <div class="verdict-sub" id="verdictSub"></div>
          <div class="verdict-conf" id="verdictConf"></div>
        </div>
      </div>
    </div>

    <div class="alert" id="velocityAlert" style="display:none">
      <span class="a-icon">⚠️</span>
      <span id="velocityText"></span>
    </div>

    <div id="metricsSection" style="display:none">
      <div class="section-title">Analysis Metrics</div>
      <div class="metrics-grid" id="metricsGrid"></div>
    </div>

    <div class="overlay-wrap" id="overlayWrap" style="display:none">
      <img id="overlayImg" alt="heatmap">
      <div class="cap">Deviation heatmap — red areas indicate print quality loss</div>
    </div>

    <div id="batchInfo"></div>

    <div id="medicineInfo" style="display:none"></div>

    <div id="map"></div>
  </div>

  <div class="footer">
    <div class="brand">AntiFake</div>
    <div class="privacy">Images processed once, not stored. No personal data collected.</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const dropZone = $('dropZone'), fileInput = $('fileInput'), preview = $('preview');
const dropText = $('dropText'), latInput = $('latInput'), lngInput = $('lngInput');
const verifyBtn = $('verifyBtn'), loading = $('loading'), result = $('result');
const badge = $('badge'), badgeIcon = $('badgeIcon'), badgeLabel = $('badgeLabel'), badgeMsg = $('badgeMsg');
const verdictCard = $('verdictCard'), verdictIcon = $('verdictIcon');
const verdictTitle = $('verdictTitle'), verdictSub = $('verdictSub'), verdictConf = $('verdictConf');
const velocityAlert = $('velocityAlert'), velocityText = $('velocityText');
const metricsSection = $('metricsSection'), metricsGrid = $('metricsGrid');
const overlayWrap = $('overlayWrap'), overlayImg = $('overlayImg');
const batchInfo = $('batchInfo'), medicineInfo = $('medicineInfo'), mapDiv = $('map');

let selectedFile = null, map = null, routeLine = null, markers = [];

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.classList.add('show');
    dropText.style.display = 'none';
    dropZone.classList.add('has-image');
    verifyBtn.disabled = false;
    result.classList.remove('show');
    if (map) { map.remove(); map = null; }
  };
  reader.readAsDataURL(file);
}

verifyBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  verifyBtn.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');
  if (map) { map.remove(); map = null; }
  try {
    const b64 = await new Promise(resolve => { const r = new FileReader(); r.onload = () => resolve(r.result.split(',')[1]); r.readAsDataURL(selectedFile); });
    const lat = parseFloat(latInput.value) || 0, lng = parseFloat(lngInput.value) || 0;
    const ts = new Date().toISOString();
    const resp = await fetch('/api/v1/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ batch_id: 'BATCH-A', serial: '001', image_base64: b64, lat, lng, timestamp: ts })
    });
    showResult(await resp.json(), lat, lng);
  } catch (err) {
    showResult({ status: 'error', confidence: 0, message: 'Connection failed', metrics: null, overlay_base64: null, batch_info: null, scan_history: null }, 0, 0);
  } finally {
    loading.classList.remove('show');
    verifyBtn.disabled = false;
  }
});

function showResult(data, scanLat, scanLng) {
  result.classList.add('show');
  const ok = data.status === 'verified', fake = data.status === 'counterfeit';
  const emoji = ok ? '✅' : fake ? '🚫' : '⚠️';
  const label = ok ? 'AUTHENTIC' : fake ? 'COUNTERFEIT' : 'ERROR';
  const cls = ok ? 'verified' : fake ? 'counterfeit' : 'error';

  badge.className = 'status-badge ' + cls;
  badgeIcon.textContent = emoji;
  badgeLabel.textContent = label;
  badgeMsg.textContent = data.message || '';

  verdictCard.style.display = 'block';
  verdictIcon.className = 'verdict-icon ' + cls;
  verdictIcon.textContent = emoji;
  verdictTitle.className = 'verdict-title ' + cls;
  verdictTitle.textContent = ok ? 'Verification Passed' : fake ? 'Counterfeit Detected' : 'Error';
  verdictSub.textContent = data.message || '';
  verdictConf.textContent = 'Confidence: ' + Math.round((data.confidence || 0) * 100) + '%';

  // Metrics grid
  if (data.metrics) {
    metricsSection.style.display = 'block';
    const items = [
      ['Edge Diff', data.metrics.edge_diff_ratio, '#22c55e'],
      ['Histogram', data.metrics.hist_correlation, data.metrics.hist_correlation > 0.6 ? '#22c55e' : '#ef4444'],
      ['Pixel Bleed', data.metrics.bleed_ratio, data.metrics.bleed_ratio < 0.25 ? '#22c55e' : '#ef4444'],
      ['Confidence', (data.metrics.confidence * 100).toFixed(0) + '%', data.metrics.confidence > 0.8 ? '#22c55e' : data.metrics.confidence > 0.5 ? '#f59e0b' : '#ef4444'],
    ];
    metricsGrid.innerHTML = items.map(([lbl, val, color]) =>
      '<div class="metric-card"><div class="val" style="color:' + color + '">' + val + '</div><div class="lbl">' + lbl + '</div><div class="metric-bar"><div class="fill" style="width:' + (typeof val === 'string' ? 100 : Math.min(Math.abs(val) * 100, 100)) + '%;background:' + color + '"></div></div></div>'
    ).join('');
  } else metricsSection.style.display = 'none';

  // Overlay
  if (data.overlay_base64) { overlayWrap.style.display = 'block'; overlayImg.src = 'data:image/png;base64,' + data.overlay_base64; }
  else overlayWrap.style.display = 'none';

  // Velocity alert
  const sh = data.scan_history;
  if (sh && sh.velocity_alert) { velocityAlert.style.display = 'flex'; velocityText.textContent = sh.velocity_alert; }
  else velocityAlert.style.display = 'none';

  // Batch + map
  const bi = data.batch_info;
  batchInfo.innerHTML = ''; medicineInfo.style.display = 'none'; mapDiv.classList.remove('show');
  if (bi && bi.route && bi.route.length > 0) {
    const rt = bi.route;
    batchInfo.innerHTML = '<div class="section-title" style="margin-top:4px">Supply Chain Journey</div>'
      + '<div class="card"><div class="batch-header">📦 ' + bi.batch_id + ' — ' + bi.region + '</div>'
      + '<div class="batch-region">Minted: ' + (bi.mint_date || 'unknown') + '</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">'
      + rt.map((p, i) => '<span style="background:#0b1120;padding:4px 10px;border-radius:6px;font-size:11px;color:#94a3b8">' + (i + 1) + '. ' + p.location_name.split('—')[0].trim() + '</span>').join('')
      + '</div></div>';

    const medData = {
      'BATCH-A': { name: 'Paracetamol 500mg', manufacturer: 'PharmaCorp Myanmar', use: 'Fever & Pain Relief', expiry: '2028-05', batch: 'BATCH-A', adverse: 'Report to MMFDA' },
      'BATCH-B': { name: 'Amoxicillin 250mg', manufacturer: 'VinPharm Vietnam', use: 'Antibiotic', expiry: '2028-02', batch: 'BATCH-B', adverse: 'Report to DAV' },
      'BATCH-C': { name: 'Omeprazole 20mg', manufacturer: 'SiamPharm Thailand', use: 'Acid Reflux', expiry: '2027-11', batch: 'BATCH-C', adverse: 'Report to Thai FDA' },
    };
    const m = medData[bi.batch_id];
    if (m) {
      medicineInfo.style.display = 'block';
      if (ok) {
        medicineInfo.innerHTML = '<div class="med-card"><div class="head ok">💊 Medicine Information</div><div class="med-grid">'
          + '<span class="ml">Name</span><span class="mv">' + m.name + '</span>'
          + '<span class="ml">Manufacturer</span><span class="mv">' + m.manufacturer + '</span>'
          + '<span class="ml">Use</span><span class="mv">' + m.use + '</span>'
          + '<span class="ml">Expiry</span><span class="mv">' + m.expiry + '</span>'
          + '<span class="ml">Batch</span><span class="mv">' + m.batch + '</span>'
          + '<span class="ml">Adverse Events</span><span class="mv warn">' + m.adverse + '</span>'
          + '</div></div>';
      } else {
        medicineInfo.innerHTML = '<div class="med-card"><div class="head bad">🚫 Counterfeit Warning</div><div style="color:#fbbf24;font-size:12px">This product claims to be "' + m.name + '" but verification failed. <strong>Do not consume.</strong> Report to local health authorities.</div></div>';
      }
    }

    mapDiv.classList.add('show');
    setTimeout(() => {
      if (map) map.remove();
      const bounds = L.latLngBounds(rt.map(p => [p.lat, p.lng]));
      if (scanLat && scanLng) bounds.extend([scanLat, scanLng]);
      map = L.map('map', { zoomControl: true, scrollWheelZoom: false }).fitBounds(bounds, { padding: [30, 30] });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '', maxZoom: 18 }).addTo(map);
      const pts = rt.map(p => [p.lat, p.lng]);
      L.polyline(pts, { color: '#22c55e', weight: 3, dashArray: '8, 6' }).addTo(map);
      rt.forEach((p, i) => {
        const color = i === 0 ? '#3b82f6' : i === rt.length - 1 ? '#22c55e' : '#f59e0b';
        const m = L.marker([p.lat, p.lng], {
          icon: L.divIcon({ html: '<div style="background:' + color + ';color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)">' + (i + 1) + '</div>', iconSize: [24, 24], iconAnchor: [12, 12] })
        }).addTo(map);
        m.bindTooltip(p.location_name + ' — ' + p.event, { direction: 'top', offset: [0, -14] });
      });
      if (scanLat && scanLng) {
        L.marker([scanLat, scanLng], {
          icon: L.divIcon({ html: '<div style="background:#ef4444;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px rgba(239,68,68,.6)"></div>', iconSize: [14, 14], iconAnchor: [7, 7] })
        }).addTo(map).bindTooltip('Your scan location', { direction: 'top' });
      }
    }, 100);
  }
}
</script>
</body>
</html>
